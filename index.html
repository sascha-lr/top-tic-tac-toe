<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP | Tic-Tac-Toe</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./app.js" defer></script>
</head>

<body>

    <main>

        <h1 class="announcer">Tic-Tac-Toe</h1>

        <div class="game-board">
        </div>

        <button data-action="reset">
            New Game
        </button>
        <button data-action="new-round">
            New Round
        </button>

        <p data-type="p1-score"></p>
        <p data-type="p2-score"></p>

        <dialog id="start-game-dialog">
            <form action="" method="dialog">
                <fieldset>
                    <legend>Player 1, choose a Symbol to play with</legend>
                    <label for="X">X</label>
                    <input type="radio" id="X" name="symbol" value="X" checked>
                    <label for="O">O</label>
                    <input type="radio" id="O" name="symbol" value="O">
                </fieldset>
                <fieldset>
                    <legend>Please choose Player Names</legend>
                    <label for="p1-name">Player 1 Name</label>
                    <input type="text" name="p1-name" id="p1-name" placeholder="f.e.: Jimmy">
                    <label for="p2-name">Player 2 Name</label>
                    <input type="text" name="p2-name" id="p2-name" placeholder="f.e.: Cindy">
                </fieldset>
                <button type="submit" id="start">Start</button>
            </form>
        </dialog>

    </main>

</body>

</html>
