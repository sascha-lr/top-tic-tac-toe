<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP | Tic-Tac-Toe</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./app.js" defer></script>

    <link href="./assets/fonts/lexend-v26-latin-regular.woff2" type="font/woff2" rel="preload" as="font" crossorigin>
    <link href="./assets/fonts/lexend-v26-latin-500.woff2" type="font/woff2" rel="preload" as="font" crossorigin>
    <link href="./assets/fonts/lexend-v26-latin-700.woff2" type="font/woff2" rel="preload" as="font" crossorigin>

</head>

<body>

    <main>

        <section class="game-screen">
            <h1 class="announcer">Tic-Tac-Toe</h1>

            <div class="game-board">
            </div>

            <div class="buttons">
                <button type="button" data-action="reset">
                    New Game
                </button>
                <button type="button" data-action="new-round">
                    New Round
                </button>
            </div>

            <div class="scores">
                <p data-type="p1-score"></p>
                <p data-type="p2-score"></p>
            </div>
        </section>

        <dialog id="start-game-dialog" closedby="none">
            <form action="" method="dialog">
                <div class="form-container">
                    <h1 class="game-title">Tic-<span class="secondary">Tac</span>-<span class="tertiary">Toe</span></h1>
                    <fieldset class="player-symbols">
                        <legend>Player 1, choose a Symbol</legend>
                        <label for="X" class="secondary">X
                            <input type="radio" id="X" name="symbol" value="X" checked>
                        </label>
                        <label for="O" class="tertiary">O
                            <input type="radio" id="O" name="symbol" value="O">
                        </label>
                    </fieldset>
                    <fieldset class="player-names">
                        <legend>Please, choose your Names</legend>
                        <ul>
                            <li>
                                <label for="p1-name">Player 1 Name:</label>
                                <input type="text" name="p1-name" id="p1-name" placeholder="f.e.: Jimmy">
                            </li>
                            <li>
                                <label for="p2-name">Player 2 Name:</label>
                                <input type="text" name="p2-name" id="p2-name" placeholder="f.e.: Cindy">
                            </li>
                        </ul>
                    </fieldset>
                    <button type="submit" id="start">Start Game</button>
                </div>
            </form>
        </dialog>

    </main>

</body>

</html>
